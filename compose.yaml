# Local infrastructure for the API, worker, and future queue/object-storage services.
services:
  postgres:
    image: postgres:16
    container_name: ee-library-postgres
    environment:
      POSTGRES_DB: ee_library
      POSTGRES_PASSWORD: ee_library
      POSTGRES_USER: ee_library
    ports:
      - "5432:5432"
    volumes:
      - ee-library-postgres:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    container_name: ee-library-redis
    ports:
      - "6379:6379"

  object-storage:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    container_name: ee-library-object-storage
    environment:
      MINIO_ROOT_PASSWORD: ee_library_secret
      MINIO_ROOT_USER: ee_library
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ee-library-object-storage:/data

volumes:
  ee-library-object-storage:
  ee-library-postgres:
