name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      # The team server ships a real `next build`; this catches prerender regressions
      # (e.g. useSearchParams outside Suspense) that typecheck and tests cannot see.
      - name: Production web build
        run: npm run build -w @ee-library/web
        env:
          AUTH_TRUST_HOST: "true"
