<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EE Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', -apple-system, sans-serif; background: #EAE4DA; color: #18140F; }
  #root { height: 100%; display: flex; }

  #tweaks-panel { display: none; position: fixed; bottom: 20px; right: 20px; z-index: 9000;
    width: 220px; background: #1E3A18; border: 1px solid #2C4F26; border-radius: 8px; padding: 16px;
    font-family: 'DM Sans', sans-serif; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  #tweaks-panel.visible { display: block; }
  #tweaks-panel h3 { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #6B8A65; margin-bottom: 14px; font-family: 'Syne', sans-serif; }
  .tw-label { display: block; font-size: 10px; color: #6B8A65; margin-bottom: 7px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .tw-row { margin-bottom: 14px; }
  .tw-btns { display: flex; flex-direction: column; gap: 4px; }
  .tw-btns button { padding: 7px 12px; border-radius: 3px; border: 1px solid #2C4F26;
    background: transparent; color: #A8C9A0; font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; text-align: left; transition: all 0.1s; }
  .tw-btns button:hover { border-color: #4B7242; color: #D9E8D6; }
  .tw-btns button.active { background: #4B1D3F30; border-color: #4B1D3F; color: #D9B5C8; font-weight: 600; }
  .tw-sep { height: 1px; background: #2C4F26; margin: 12px 0; }
  .tw-note { font-size: 10.5px; color: #4A6845; line-height: 1.6; }
</style>
</head>
<body>
<div id="root"></div>

<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tw-row">
    <span class="tw-label">Navigate to</span>
    <div class="tw-btns" id="tw-nav">
      <button class="active" onclick="twNav('home')">Quick Readiness Check</button>
      <button onclick="twNav('detail')">Part Detail Record</button>
      <button onclick="twNav('admin')">Admin Review Queue</button>
    </div>
  </div>
  <div class="tw-sep"></div>
  <p class="tw-note">All screens are reachable via the sidebar — these are quick shortcuts.</p>
</div>

<script type="text/babel" src="v3-shared.jsx"></script>
<script type="text/babel" src="v3-home.jsx"></script>
<script type="text/babel" src="v3-detail.jsx"></script>
<script type="text/babel" src="v3-admin.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "activeView": "home"
}/*EDITMODE-END*/;

const { useState, useEffect } = React;

const NAV = [
  { id: 'home',   label: 'Quick Check',  desc: 'Readiness lookup',
    icon: <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" strokeWidth="1.5"/><path d="M10 10l3.5 3.5M5 6.5h3M6.5 5v3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg> },
  { id: 'detail', label: 'Part Detail',  desc: 'Readiness record',
    icon: <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><rect x="2" y="1" width="11" height="13" rx="1.5" stroke="currentColor" strokeWidth="1.5"/><path d="M4.5 5h6M4.5 7.5h6M4.5 10h4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg> },
  { id: 'admin',  label: 'Review Queue', desc: 'Admin & approvals',
    icon: <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M1.5 4.5h12M1.5 7.5h8M1.5 10.5h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><circle cx="12.5" cy="7.5" r="2" fill="currentColor" opacity="0.5"/></svg> },
];

function Sidebar({ view, setView }) {
  const c = window.V2C;
  return (
    <aside style={{ width: 196, flexShrink: 0, background: c.sidebarBg, display: 'flex', flexDirection: 'column', height: '100%', borderRight: `1px solid ${c.sidebarBorder}` }}>
      <div style={{ padding: '16px 18px 14px', borderBottom: `1px solid ${c.sidebarBorder}` }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
          <div style={{ width: 26, height: 26, border: `2px solid #99C68E`, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
              <rect x="1" y="1" width="4" height="4" rx="0.5" fill="#99C68E"/>
              <rect x="7" y="1" width="4" height="4" rx="0.5" fill="#99C68E" opacity="0.4"/>
              <rect x="1" y="7" width="4" height="4" rx="0.5" fill="#99C68E" opacity="0.4"/>
              <rect x="7" y="7" width="4" height="4" rx="0.5" fill="#99C68E"/>
            </svg>
          </div>
          <div>
            <p style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 13, color: '#EAF3E6', letterSpacing: '0.02em' }}>EE Library</p>
            <p style={{ fontSize: 9.5, color: c.sidebarText, letterSpacing: '0.06em', marginTop: 1 }}>Parts · CAD · Readiness</p>
          </div>
        </div>
      </div>

      <div style={{ padding: '10px 8px', flex: 1 }}>
        <p style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#3D5538', padding: '4px 10px 6px' }}>Workspace</p>
        {NAV.map(item => {
          const active = view === item.id;
          return (
            <button key={item.id} onClick={() => setView(item.id)} style={{
              display: 'flex', alignItems: 'center', gap: 10,
              width: '100%', padding: '7px 10px', borderRadius: 3, border: 'none',
              cursor: 'pointer', marginBottom: 1, textAlign: 'left',
              background: active ? c.sidebarActiveBg : 'transparent',
              color: active ? c.sidebarActive : c.sidebarText,
              fontFamily: 'inherit', transition: 'all 0.1s',
            }}
            onMouseEnter={e => { if (!active) e.currentTarget.style.background = '#2A4724'; }}
            onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}>
              <span style={{ color: active ? c.sidebarActive : '#5A7853', flexShrink: 0 }}>{item.icon}</span>
              <div>
                <p style={{ fontSize: 12.5, fontWeight: active ? 600 : 400 }}>{item.label}</p>
                <p style={{ fontSize: 10, color: active ? '#B5D9AD' : '#3D5538', marginTop: 1 }}>{item.desc}</p>
              </div>
              {item.id === 'admin' && (
                <span style={{ marginLeft: 'auto', background: '#4B1D3F', color: '#F0E8ED', fontSize: 9.5, fontWeight: 700, padding: '1px 5px', borderRadius: 8 }}>19</span>
              )}
            </button>
          );
        })}

        <div style={{ height: 1, background: c.sidebarBorder, margin: '10px 10px' }} />
        <p style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#3D5538', padding: '4px 10px 6px' }}>Library</p>
        {[
          { label: 'My Parts', count: '142' },
          { label: 'Connectors', count: '38' },
          { label: 'Approved Parts', count: '119' },
        ].map(item => (
          <button key={item.label} style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            width: '100%', padding: '5px 10px', borderRadius: 3, border: 'none',
            cursor: 'pointer', background: 'transparent', fontFamily: 'inherit',
          }}
          onMouseEnter={e => e.currentTarget.style.background = '#2A4724'}
          onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
            <span style={{ fontSize: 12, color: c.sidebarText }}>{item.label}</span>
            <span style={{ fontSize: 10, color: '#3D5538' }}>{item.count}</span>
          </button>
        ))}
      </div>

      <div style={{ padding: '12px 16px', borderTop: `1px solid ${c.sidebarBorder}` }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{ width: 26, height: 26, borderRadius: '50%', background: '#4B1D3F30', border: `1.5px solid #D9B5C8`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10.5, fontWeight: 800, color: '#D9B5C8', fontFamily: 'Syne, sans-serif', flexShrink: 0 }}>TN</div>
          <div>
            <p style={{ fontSize: 12, color: '#D9E8D6', fontWeight: 500 }}>T. Nakamura</p>
            <p style={{ fontSize: 10, color: '#3D5538' }}>Hardware Engineer</p>
          </div>
        </div>
      </div>
    </aside>
  );
}

function App() {
  const saved = (() => { try { return localStorage.getItem('eel3-view'); } catch { return null; } })();
  const [view, setView] = useState(saved || TWEAK_DEFAULTS.activeView);

  useEffect(() => {
    try { localStorage.setItem('eel3-view', view); } catch {}
    document.querySelectorAll('#tw-nav button').forEach((b, i) => {
      const ids = ['home', 'detail', 'admin'];
      b.classList.toggle('active', ids[i] === view);
    });
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { activeView: view } }, '*');
  }, [view]);

  useEffect(() => { window.__setV3View = setView; }, [setView]);

  const c = window.V2C;
  const views = {
    home:   <window.V3HomeView   onOpenDetail={() => setView('detail')} onOpenAdmin={() => setView('admin')} />,
    detail: <window.V3DetailView onBack={() => setView('home')} />,
    admin:  <window.V3AdminView  onOpenDetail={() => setView('detail')} />,
  };

  return (
    <div style={{ display: 'flex', height: '100%', background: c.bg }}>
      <Sidebar view={view} setView={setView} />
      <main style={{ flex: 1, overflow: 'auto', background: c.bg }}>{views[view]}</main>
    </div>
  );
}

window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode')   document.getElementById('tweaks-panel').classList.add('visible');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
function twNav(id) {
  if (window.__setV3View) window.__setV3View(id);
  document.querySelectorAll('#tw-nav button').forEach((b, i) => {
    const ids = ['home', 'detail', 'admin'];
    b.classList.toggle('active', ids[i] === id);
  });
}
</script>
</body>
</html>
