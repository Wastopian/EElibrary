# File header: Production compose stack for one shared EE Library team server.
#
# Engineers never touch this file — they open the team address in a browser and sign in.
# The one server admin runs:
#
#   node scripts/setup-team-server.mjs     (once: writes .env.team with generated secrets)
#   docker compose -f compose.team.yaml up -d --build
#
# The full walkthrough (including backups and upgrades) lives in docs/TEAM_SERVER_SETUP.md.
#
# Boundaries this file enforces:
# - Only the web app is published to the network. The API and database stay private to the
#   stack; browsers reach the API through the web app's same-origin /api-proxy path.
# - Migrations run as a one-shot service before the api/worker start, so an upgraded stack
#   never serves requests against an older schema.
# - File storage is the local-filesystem backend on a named volume shared by api and worker.

name: ee-library-team

services:
  postgres:
    image: postgres:16
    env_file: .env.team
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - team-postgres:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      target: migrate
    env_file: .env.team
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    env_file: .env.team
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - team-storage:/data/storage
      - ${EE_LIBRARY_PROJECT_FILES_HOST_DIR:-./team-data/project-files}:/data/project-files
      - ${EE_LIBRARY_VENDOR_NOTES_HOST_DIR:-./team-data/vendor-notes}:/data/vendor-notes

  worker:
    build:
      context: .
      target: worker
    env_file: .env.team
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - team-storage:/data/storage
      - ${EE_LIBRARY_PROJECT_FILES_HOST_DIR:-./team-data/project-files}:/data/project-files

  web:
    build:
      context: .
      target: web
    env_file: .env.team
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      # The one address engineers use. Change the published port with EE_LIBRARY_TEAM_PORT.
      - "${EE_LIBRARY_TEAM_PORT:-8080}:3000"

volumes:
  team-postgres:
  team-storage:
